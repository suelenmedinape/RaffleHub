<div class="relative isolate px-6 pt-5 lg:px-8">
    <app-background-decoration position="top" variant="left" />
    <div class="mx-auto max-w-2xl py-25 sm:py-38 lg:py-46">
        <div class="hidden sm:mb-8 sm:flex sm:justify-center">
            <div
                class="relative rounded-full px-3 py-1 text-sm/6 text-gray-600 ring-1 ring-gray-900/10 hover:ring-gray-900/20 dark:text-gray-400 dark:ring-white/10 dark:hover:ring-white/20">
                Participe das nossas rifas. <a href="/raffle"
                    class="font-semibold text-indigo-600 dark:text-verde-500"><span aria-hidden="true"
                        class="absolute inset-0"></span>Ver mais <span aria-hidden="true">&rarr;</span></a>
            </div>
        </div>
        <div class="text-center mb-20">
            <h1 class="text-5xl font-semibold tracking-tight text-balance text-gray-900 sm:text-7xl dark:text-white">
                Equipe Baja <br> <span class="typewriter text-indigo-400 dark:text-verde-500">{{ displayedText()
                    }}</span>
            </h1>
            <p class="mt-8 text-lg font-medium text-pretty text-gray-500 sm:text-xl/8 dark:text-gray-400">Transformamos
                teoria em prática por meio do projeto e construção de um veículo off-road para competições Baja SAE.</p>
            <div class="mt-10 flex items-center justify-center gap-x-6">
                <a href="#"
                    class="rounded-md bg-indigo-600 px-3.5 py-2.5 text-sm font-semibold text-white dark:text-indigo-950 shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:hover:bg-verde-400 dark:focus-visible:outline-indigo-500 dark:bg-verde-500">Conhecer
                    Equipe</a>
            </div>
        </div>


        <div class="flex flex-col items-center gap-5 text-sm text-gray-700 dark:text-gray-300">
            <span class="font-medium">Patrocinadores</span>

            @defer (on viewport) {
            <div class="flex items-center gap-6">
                <!-- FAPERJ -->
                <picture class="dark:hidden">
                    <source srcset="/faperj-ligth.webp" type="image/webp">
                    <img src="/faperj-ligth.png" alt="FAPERJ" class="h-15 w-auto" width="2585" height="1012"
                        fetchpriority="high" loading="eager" />
                </picture>
                <picture class="hidden dark:block">
                    <source srcset="/faperj-dark.webp" type="image/webp">
                    <img src="/faperj-dark.png" alt="FAPERJ" class="h-15 w-auto" width="2585" height="1012"
                        fetchpriority="high" loading="eager" />
                </picture>

                <!-- SolidWorks -->
                <picture class="dark:hidden">
                    <source srcset="/solid-ligth.webp" type="image/webp">
                    <img src="/solid-ligth.png" alt="SolidWorks" class="h-15 w-auto" width="1280" height="264"
                        fetchpriority="high" loading="eager" />
                </picture>
                <picture class="hidden dark:block">
                    <source srcset="/solid-dark.webp" type="image/webp">
                    <img src="/solid-dark.png" alt="SolidWorks" class="h-15 w-auto" width="1280" height="264"
                        fetchpriority="high" loading="eager" />
                </picture>
            </div>
            } @placeholder {
            <div class="h-15 w-64 bg-gray-100 dark:bg-gray-800 animate-pulse rounded"></div>
            }
        </div>

    </div>

    <app-background-decoration position="bottom" variant="right" />
</div>
