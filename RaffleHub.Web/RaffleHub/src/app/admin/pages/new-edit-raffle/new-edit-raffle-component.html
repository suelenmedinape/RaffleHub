<section class="bg-white dark:bg-gray-900">
    <div class="py-8 px-4 mx-auto max-w-2xl lg:py-16">
        <h2 class="mb-4 text-xl font-bold text-gray-900 dark:text-white">{{ isEdit() ? 'Edit Raffle' : 'Add a new Raffle' }}</h2>
        <form (ngSubmit)="submitForm()">
            <div class="grid gap-4 sm:grid-cols-2 sm:gap-6">
                <div class="flex items-center justify-center w-full sm:col-span-2">
                    <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-64 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 dark:hover:bg-gray-800 dark:bg-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:hover:border-gray-500 dark:hover:bg-gray-600 overflow-hidden relative">
                        @if (sanitizedFilePreview) {
                            <img [src]="sanitizedFilePreview" alt="Image Preview" class="w-full h-full object-contain bg-gray-100 dark:bg-gray-800">
                        } @else {
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                                </svg>
                                <p class="mb-2 text-sm text-gray-500 dark:text-gray-400"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">SVG, PNG, JPG or GIF (MAX. 800x400px)</p>
                            </div>
                        }
                        <input id="dropzone-file" type="file" class="hidden" (change)="onFileSelected($event)" accept="image/*" />
                    </label>
                </div>
                <div class="sm:col-span-2">
                    <app-input [value]="$any(form.model()).raffleName" (valueChange)="form.updateField($any('raffleName'), $event)"
                               inputId="raffleName" label="Raffle Name" type="text" name="raffleName" placeholder="Enter the raffle name"
                               [errorMessage]="form.errors()['raffleName'] || ''" />
                </div>
                <div class="w-full">
                    <app-input [value]="$any(form.model()).ticketPrice" (valueChange)="form.updateField($any('ticketPrice'), +$event)"
                               inputId="ticketPrice" label="Ticket Price (R$)" type="number" name="ticketPrice" placeholder="Ex: 10.00"
                               [errorMessage]="form.errors()['ticketPrice'] || ''" />
                </div>
                <div class="w-full">
                    <app-input [value]="$any(form.model()).totalTickets" (valueChange)="form.updateField($any('totalTickets'), +$event)"
                               inputId="totalTickets" label="Total Tickets" type="number" name="totalTickets" placeholder="Ex: 100"
                               [errorMessage]="form.errors()['totalTickets'] || ''" />
                </div>
                <div class="sm:col-span-2">
                    <app-input [value]="$any(form.model()).drawDate" (valueChange)="form.updateField($any('drawDate'), $event)"
                               inputId="drawDate" label="Draw Date" type="datetime-local" name="drawDate"
                               [errorMessage]="form.errors()['drawDate'] || ''" />
                </div>
                <div class="sm:col-span-2">
                    <label for="description" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Description</label>
                    <textarea id="description" rows="8" name="description"
                              [value]="$any(form.model()).description" (input)="form.updateField($any('description'), $any($event.target).value)"
                              class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-verde-500 focus:border-verde-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-verde-500 dark:focus:border-verde-500" placeholder="Raffle description..."></textarea>
                    @if (form.errors()['description']) {
                        <p class="mt-2 text-sm text-red-600 dark:text-red-400">
                            • {{ form.errors()['description'] }}
                        </p>
                    }
                </div>
            </div>
            <button type="submit" [disabled]="isLoading()" class="inline-flex items-center px-5 py-2.5 mt-4 sm:mt-6 text-sm font-medium text-center text-white bg-verde-700 rounded-lg focus:ring-4 focus:ring-verde-200 dark:focus:ring-verde-900 hover:bg-verde-800 disabled:opacity-50">
                @if (!isLoading()) {
                    {{ isEdit() ? 'Salvar Dados' : 'Criar Rifa' }}
                } @else {
                    <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z">
                        </path>
                    </svg>

                    Carregando...
                }
            </button>
        </form>
    </div>
</section>
